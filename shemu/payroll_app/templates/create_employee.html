{% extends 'payroll_app/base.html' %}

{% block title %}Create Employee{% endblock %}

{% block content %}
<section class="form-section">
    <div class="form-card">
        <h1>Create Employee</h1>

        {% if error %}
            <p class="error-message">{{ error }}</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <label>Name:</label>
            <input type="text" name="name" value="{{ form_values.name }}" required>

            <label>ID Number:</label>
            <input type="text" name="id_number" value="{{ form_values.id_number }}" pattern="[0-9]+" required>

            <label>Rate:</label>
            <input type="number" name="rate" value="{{ form_values.rate }}" step="0.01" required>

            <label>Allowance (Optional):</label>
            <input type="number" name="allowance" value="{{ form_values.allowance }}" step="0.01">

            <label>Username:</label>
            <input type="text" name="username" value="{{ form_values.username }}" required>

            <label>Password:</label>
            <input type="password" name="password" value="{{ form_values.password }}" required>

            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>
</section>
{% endblock %}
