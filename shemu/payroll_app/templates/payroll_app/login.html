{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shemu — Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'payroll_app/css/style.css' %}">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">Shemu</div>
    <div class="login-tagline">SHEMU — Sign in to continue</div>

    {% if form.errors %}
    <div class="alert alert-danger">Invalid username or password. Please try again.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}

      <div class="form-group">
        <label>Username</label>
        <input class="form-control" type="text" name="username" placeholder="Enter username" autofocus required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input class="form-control" type="password" name="password" placeholder="Enter password" required>
      </div>

      <button class="btn btn-primary" type="submit">Sign In</button>
    </form>
  </div>
</div>
</body>
</html>
