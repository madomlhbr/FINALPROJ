{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h2>Update Employee</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="name">Name:</label>
            <!-- Pre-filled with employee info -->
            <input type="text" class="form-control" name="name" value="{{ employee.name }}" required>
        </div>
        <div class="form-group">
            <label for="id_number">ID Number:</label>
            <input type="text" class="form-control" name="id_number" value="{{ employee.id_number }}" required>
        </div>
        <div class="form-group">
            <label for="rate">Rate:</label>
            <input type="number" step="0.01" class="form-control" name="rate" value="{{ employee.rate }}" required>
        </div>
        <div class="form-group">
            <label for="allowance">Allowance (Optional):</label>
            <input type="number" step="0.01" class="form-control" name="allowance" value="{{ employee.allowance|default:0 }}">
        </div>
        <button type="submit" class="btn btn-primary mt-3">Submit</button>
    </form>
</div>
{% endblock %}
